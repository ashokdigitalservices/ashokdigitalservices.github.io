<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Digital Services | બેસ્ટ ઓનલાઈન સરકારી અને ડિજિટલ સેવાઓ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS: તમારી સ્ટાઈલ અહી છે */
        :root { --primary-color: #0b4c8c; --secondary-color: #198754; --bg-main: #f4f6f9; --bg-card: #ffffff; --text-main: #333333; }
        [data-theme="dark"] { --bg-main: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        /* ગૂગલ ટ્રાન્સલેટ બેનર હટાવવા */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-simple img { display: none !important; }
        body { top: 0px !important; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--bg-card); }
        .lang-select-custom { padding: 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div><strong>ASHOK DIGITAL SERVICES</strong></div>
            <nav>
                <ul>
                    <!-- લેંગ્વેજ સિલેક્ટર -->
                    <li>
                        <select id="langSelectDropdown" class="lang-select-custom" onchange="changeLanguage(this.value)">
                            <option value="gu">ગુજરાતી</option>
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                        </select>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- બાકીની બધી જ ડિઝાઇન તમે અહીં મૂકી શકો છો -->
    <section style="padding: 50px; text-align: center;">
        <h1>સરકારી અને ડિજિટલ કામકાજ</h1>
        <p>અહીં તમારી વેબસાઈટનું કન્ટેન્ટ આવશે.</p>
    </section>

    <!-- ગૂગલ ટ્રાન્સલેટ એન્જિન -->
    <div id="google_translate_element" style="display:none;"></div>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // ૧. ઇનિશિયલાઇઝેશન
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'gu',
                includedLanguages: 'gu,en,hi',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // ૨. ભાષા બદલવા માટેનું મુખ્ય ફંક્શન
        function changeLanguage(lang) {
            var selectField = document.querySelector(".goog-te-combo");
            if (selectField) {
                selectField.value = lang;
                selectField.dispatchEvent(new Event('change'));
            }
        }
    </script>
</body>
</html>
